name: Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest
    env:
      CAPACITOR_VERSION: 7.4.3
      TYPESCRIPT_VERSION: 5.9.3
      ANDROID_PLATFORM: android-35
      ANDROID_BUILD_TOOLS: 35.0.0
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses > /dev/null

      - name: Install Android SDK packages
        run: sdkmanager "platform-tools" "platforms;${ANDROID_PLATFORM}" "build-tools;${ANDROID_BUILD_TOOLS}"

      - name: Install CI-only Capacitor tooling
        run: |
          npm install --no-save \
            @capacitor/android@${CAPACITOR_VERSION} \
            @capacitor/cli@${CAPACITOR_VERSION} \
            @capacitor/core@${CAPACITOR_VERSION} \
            typescript@${TYPESCRIPT_VERSION}

      - name: Build local-app web bundle
        run: npm run build:local-web

      - name: Sync Capacitor Android project
        run: npx cap sync android

      - name: Configure Android SDK path
        run: |
          SDK_PATH="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          printf 'sdk.dir=%s\n' "$SDK_PATH" > android/local.properties

      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: web-2fa-local-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
