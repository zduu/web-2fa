name: Android APK

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: "Publish the APK to a GitHub Release after building."
        required: false
        default: false
        type: boolean
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    env:
      CAPACITOR_VERSION: 7.4.3
      TYPESCRIPT_VERSION: 5.9.3
      ANDROID_PLATFORM: android-35
      ANDROID_BUILD_TOOLS: 35.0.0
      SYNC_APK_NAME: web-2fa-sync-debug.apk
      LOCAL_APK_NAME: web-2fa-local-debug.apk
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses > /dev/null

      - name: Install Android SDK packages
        run: sdkmanager "platform-tools" "platforms;${ANDROID_PLATFORM}" "build-tools;${ANDROID_BUILD_TOOLS}"

      - name: Install CI-only Capacitor tooling
        run: |
          npm install --no-save \
            @capacitor/android@${CAPACITOR_VERSION} \
            @capacitor/cli@${CAPACITOR_VERSION} \
            @capacitor/core@${CAPACITOR_VERSION} \
            typescript@${TYPESCRIPT_VERSION}

      - name: Configure Android SDK path
        run: |
          SDK_PATH="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          printf 'sdk.dir=%s\n' "$SDK_PATH" > android/local.properties

      - name: Build sync APK
        run: |
          mkdir -p build/apk-output
          APP_RUNTIME_MODE=android-app \
            APP_API_BASE_URL= \
            APP_PUBLIC_BASE_URL= \
            npm run build:local-web
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
          cd ..
          cp android/app/build/outputs/apk/debug/app-debug.apk "build/apk-output/${SYNC_APK_NAME}"

      - name: Build local-only APK
        run: |
          APP_RUNTIME_MODE=local-app \
            APP_API_BASE_URL= \
            APP_PUBLIC_BASE_URL= \
            npm run build:local-web
          npx cap sync android
          cd android
          ./gradlew assembleDebug
          cd ..
          cp android/app/build/outputs/apk/debug/app-debug.apk "build/apk-output/${LOCAL_APK_NAME}"

      - name: Upload debug APKs
        uses: actions/upload-artifact@v4
        with:
          name: web-2fa-android-debug-apks
          path: build/apk-output/*.apk
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.create_release)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            TAG="apk-${GITHUB_RUN_NUMBER}"
          fi
          APK_DIR="build/apk-output"
          NOTES="Debug APKs built by GitHub Actions. Includes web-2fa-sync-debug.apk, where the cloud URL is configured inside the app, and web-2fa-local-debug.apk for offline-only local use."
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$APK_DIR/${SYNC_APK_NAME}" "$APK_DIR/${LOCAL_APK_NAME}" --clobber
          else
            gh release create "$TAG" "$APK_DIR/${SYNC_APK_NAME}" "$APK_DIR/${LOCAL_APK_NAME}" --target "$GITHUB_SHA" --title "Web 2FA ${TAG}" --notes "$NOTES"
          fi
