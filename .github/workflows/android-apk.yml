name: Android APK

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: "Publish the APK to a GitHub Release after building."
        required: false
        default: false
        type: boolean
  push:
    branches:
      - dev
      - main
      - master
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    env:
      CAPACITOR_VERSION: 7.4.3
      TYPESCRIPT_VERSION: 5.9.3
      ANDROID_PLATFORM: android-35
      ANDROID_BUILD_TOOLS: 35.0.0
      SYNC_APK_NAME: web-2fa-sync-release.apk
      LOCAL_APK_NAME: web-2fa-local-release.apk
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses > /dev/null

      - name: Install Android SDK packages
        run: sdkmanager "platform-tools" "platforms;${ANDROID_PLATFORM}" "build-tools;${ANDROID_BUILD_TOOLS}"

      - name: Install CI-only Capacitor tooling
        run: |
          npm install --no-save \
            @capacitor/android@${CAPACITOR_VERSION} \
            @capacitor/cli@${CAPACITOR_VERSION} \
            @capacitor/core@${CAPACITOR_VERSION} \
            typescript@${TYPESCRIPT_VERSION}

      - name: Configure Android SDK path
        run: |
          SDK_PATH="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          printf 'sdk.dir=%s\n' "$SDK_PATH" > android/local.properties

      - name: Configure release signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ] || [ -z "$ANDROID_KEYSTORE_PASSWORD" ] || [ -z "$ANDROID_KEY_ALIAS" ] || [ -z "$ANDROID_KEY_PASSWORD" ]; then
            echo "Release signing secrets are required so APK updates can be installed over previous versions."
            echo "Configure ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD in repository secrets."
            exit 1
          fi
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/release.keystore
          {
            printf 'RELEASE_STORE_FILE=release.keystore\n'
            printf 'RELEASE_STORE_PASSWORD=%s\n' "$ANDROID_KEYSTORE_PASSWORD"
            printf 'RELEASE_KEY_ALIAS=%s\n' "$ANDROID_KEY_ALIAS"
            printf 'RELEASE_KEY_PASSWORD=%s\n' "$ANDROID_KEY_PASSWORD"
            printf 'APP_VERSION_CODE=%s\n' "$GITHUB_RUN_NUMBER"
            printf 'APP_VERSION_NAME=0.2.%s\n' "$GITHUB_RUN_NUMBER"
          } >> android/gradle.properties

      - name: Build sync APK
        run: |
          mkdir -p build/apk-output
          APP_RUNTIME_MODE=android-app \
            APP_API_BASE_URL= \
            APP_PUBLIC_BASE_URL= \
            npm run build:local-web
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
          cd ..
          cp android/app/build/outputs/apk/release/app-release.apk "build/apk-output/${SYNC_APK_NAME}"

      - name: Build local-only APK
        run: |
          APP_RUNTIME_MODE=local-app \
            APP_API_BASE_URL= \
            APP_PUBLIC_BASE_URL= \
            npm run build:local-web
          npx cap sync android
          cd android
          ./gradlew assembleRelease
          cd ..
          cp android/app/build/outputs/apk/release/app-release.apk "build/apk-output/${LOCAL_APK_NAME}"

      - name: Verify APK outputs
        run: |
          test -s "build/apk-output/${SYNC_APK_NAME}"
          test -s "build/apk-output/${LOCAL_APK_NAME}"
          count="$(find build/apk-output -maxdepth 1 -name '*.apk' | wc -l | tr -d ' ')"
          if [ "$count" != "2" ]; then
            echo "Expected exactly 2 APK files, got $count"
            find build/apk-output -maxdepth 1 -type f -print
            exit 1
          fi
          ls -lh build/apk-output/*.apk

      - name: Upload release APKs
        uses: actions/upload-artifact@v4
        with:
          name: web-2fa-android-release-apks
          path: build/apk-output/*.apk
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.create_release)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            TAG="apk-${GITHUB_RUN_NUMBER}"
          fi
          APK_DIR="build/apk-output"
          NOTES="Release APKs built by GitHub Actions. Both APKs use the same stable signing key and an increasing versionCode, so installing a newer APK over an older one preserves local data. Includes web-2fa-sync-release.apk, where the cloud URL is configured inside the app, and web-2fa-local-release.apk for offline-only local use."
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$APK_DIR/${SYNC_APK_NAME}" "$APK_DIR/${LOCAL_APK_NAME}" --clobber
          else
            gh release create "$TAG" "$APK_DIR/${SYNC_APK_NAME}" "$APK_DIR/${LOCAL_APK_NAME}" --target "$GITHUB_SHA" --title "Web 2FA ${TAG}" --notes "$NOTES"
          fi
